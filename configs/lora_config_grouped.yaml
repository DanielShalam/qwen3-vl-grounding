# LoRA Config for multi-instance grounding (Qwen-aligned)

model_name: "Qwen/Qwen3-VL-8B-Instruct"

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "/efs/user_folders/dnshalam/projects/qwen3-vl-grounding/checkpoints_grouped"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1e-6
  warmup_steps: 100
  logging_steps: 10
  save_steps: 2000
  save_total_limit: 2
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 4

data:
  train_file: "/efs/user_folders/dnshalam/datasets/lvis/lvis_train_grouped.json"
  max_length: 4096
  max_samples: 100000
