# LoRA Config for multi-class training (Qwen-aligned hyperparams, our pipeline)

model_name: "Qwen/Qwen3-VL-8B-Instruct"

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "/efs/user_folders/dnshalam/projects/qwen3-vl-grounding/checkpoints_multiclass"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 1e-6
  warmup_steps: 100
  logging_steps: 10
  save_steps: 2000
  save_total_limit: 2
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 4

data:
  train_file: "/efs/user_folders/dnshalam/datasets/lvis/lvis_train_multiclass.json"
  max_length: 8192
  max_samples: 50000
