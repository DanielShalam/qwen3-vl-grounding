# LoRA Configuration for Qwen3-VL Fine-tuning (3 epochs)

model_name: "Qwen/Qwen3-VL-8B-Instruct"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "/efs/user_folders/dnshalam/projects/qwen3-vl-grounding/checkpoints_3ep_v2"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  save_total_limit: 2
  bf16: true
  optim: "adamw_torch"
  dataloader_num_workers: 4

data:
  train_file: "data/lvis_conversations.json"
  max_length: 2048
  max_samples: 100000
